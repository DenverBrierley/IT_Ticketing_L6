{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
  <h1 class="mb-4">Users</h1>
  <table class="table">
    <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Active</th><th></th></tr></thead>
    <tbody>
      {% for u in users %}
        <tr>
          <td>{{ u.username }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.get_role_display }}</td>
          <td>{% if u.is_active %}Yes{% else %}No{% endif %}</td>
          <td><a href="{% url 'accounts:user_manage' u.pk %}" class="btn btn-sm btn-outline-primary">Manage</a></td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
