{% extends "base.html" %}
{% block title %}Categories{% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Categories</h1>
    <a href="{% url 'tickets:category_create' %}" class="btn btn-primary">New category</a>
  </div>
  <table class="table">
    <thead><tr><th>Name</th><th>Description</th><th></th></tr></thead>
    <tbody>
      {% for category in categories %}
        <tr>
          <td>{{ category.name }}</td>
          <td>{{ category.description }}</td>
          <td>
            <a href="{% url 'tickets:category_update' category.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
            <a href="{% url 'tickets:category_delete' category.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="3" class="text-muted">No categories yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
